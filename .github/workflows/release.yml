name: Build and release VibeTour

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check and test
        run: |
          npm run check
          npm test

      - name: Verify release tag
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          if [[ "$GITHUB_REF_NAME" != "v${version}" ]]; then
            echo "Tag $GITHUB_REF_NAME must match package.json version v${version}." >&2
            exit 1
          fi

      - name: Build VSIX
        id: package
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          mkdir -p release
          vsix="release/vibe-tour-${version}.vsix"
          npm run package -- --out "$vsix"
          echo "path=$vsix" >> "$GITHUB_OUTPUT"
          echo "name=vibe-tour-${version}" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.name }}
          path: ${{ steps.package.outputs.path }}
          if-no-files-found: error

      - name: Publish GitHub release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
          VSIX_PATH: ${{ steps.package.outputs.path }}
        shell: bash
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$VSIX_PATH" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$VSIX_PATH" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
